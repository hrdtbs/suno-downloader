<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>suno-cli</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 14px;
        width: 280px;
        background: #111;
        color: #eee;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      .row {
        margin: 6px 0;
        font-size: 12px;
      }
      .label {
        color: #999;
      }
      .ok {
        color: #34d399;
      }
      .warn {
        color: #fbbf24;
      }
      .err {
        color: #f87171;
      }
      button {
        margin-top: 10px;
        width: 100%;
        padding: 8px;
        border: none;
        border-radius: 6px;
        background: #4f46e5;
        color: white;
        cursor: pointer;
        font-size: 12px;
      }
      button:hover {
        background: #4338ca;
      }
    </style>
  </head>
  <body>
    <h1>suno-cli</h1>
    <div class="row"><span class="label">CLI:</span> <span id="cli">...</span></div>
    <div class="row"><span class="label">Suno:</span> <span id="suno">...</span></div>
    <div class="row" id="error-row" hidden>
      <span class="label">Note:</span> <span id="error" class="warn"></span>
    </div>
    <button id="refresh">Refresh token</button>
    <script src="popup.js"></script>
  </body>
</html>
